name: muslim_leveling
description: "Muslim Leveling - Nur Quest gaming Islamic app (Stitch design)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.3
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  collection: ^1.18.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  sensors_plus: ^6.1.1
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  timezone: ^0.10.0
  android_intent_plus: ^5.1.0
  sentry_flutter: ^9.23.0
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/mosque_bg.jpg
    - assets/google_fonts/
